<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinClip Quiz</title>
    <style>
      :root {
        --orange: #ff6b00;
        --black: #111111;
        --white: #ffffff;
        --green: #20b45b;
        --red: #ef4444;
        --shadow: 0 18px 40px rgba(20, 20, 20, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #161616;
        color: var(--black);
        font-family:
          Inter, ui-rounded, "SF Pro Rounded", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .phone {
        position: relative;
        width: min(100vw, 430px);
        min-height: 100vh;
        overflow: hidden;
        background: var(--orange);
        isolation: isolate;
      }

      .app {
        min-height: 100vh;
        padding: clamp(18px, 5vw, 26px) 18px 92px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .progress-row {
        display: grid;
        grid-template-columns: 1fr 50px;
        align-items: center;
        gap: 12px;
      }

      .progress-track {
        height: 18px;
        padding: 4px;
        border: 3px solid var(--white);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.25);
      }

      .progress-fill {
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: var(--white);
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.12);
      }

      .progress-clip {
        width: 50px;
        height: 50px;
        display: grid;
        place-items: center;
        border: 3px solid var(--black);
        border-radius: 50%;
        background: var(--white);
        box-shadow: 0 7px 0 rgba(0, 0, 0, 0.2);
      }

      .progress-clip svg {
        width: 27px;
      }

      .hero {
        position: relative;
        min-height: 190px;
        display: grid;
        place-items: center;
      }

      .mascot {
        width: min(48vw, 190px);
        z-index: 2;
        animation: floaty 3s ease-in-out infinite;
        transform-origin: 50% 80%;
        filter: drop-shadow(0 16px 15px rgba(0, 0, 0, 0.18));
      }

      .coin-stack {
        position: absolute;
        right: 7px;
        bottom: 5px;
        width: 82px;
        height: 74px;
      }

      .coin {
        position: absolute;
        width: 44px;
        height: 18px;
        border: 3px solid var(--black);
        border-radius: 50%;
        background: #ffd45a;
        box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.12);
      }

      .coin:nth-child(1) {
        right: 4px;
        bottom: 0;
      }

      .coin:nth-child(2) {
        right: 19px;
        bottom: 16px;
      }

      .coin:nth-child(3) {
        right: 0;
        bottom: 32px;
      }

      .piggy {
        position: absolute;
        left: 0;
        bottom: 4px;
        width: 86px;
        height: 56px;
      }

      .question-card {
        position: relative;
        margin-top: -2px;
        padding: 23px 20px 20px;
        border: 4px solid var(--black);
        border-radius: 28px;
        background: var(--white);
        box-shadow: var(--shadow), 0 8px 0 var(--black);
      }

      .eyebrow {
        margin: 0 0 9px;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.65rem, 8vw, 2.45rem);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .answers {
        display: grid;
        gap: 12px;
      }

      .answer {
        position: relative;
        width: 100%;
        min-height: 62px;
        padding: 0 58px 0 20px;
        border: 4px solid var(--black);
        border-radius: 999px;
        background: var(--white);
        color: var(--black);
        box-shadow: 0 7px 0 var(--black);
        font: inherit;
        font-size: clamp(1rem, 4.2vw, 1.16rem);
        font-weight: 950;
        text-align: left;
        cursor: pointer;
        transition:
          transform 150ms ease,
          box-shadow 150ms ease,
          background 180ms ease;
        touch-action: manipulation;
      }

      .answer:active {
        transform: scale(0.95) translateY(3px);
        box-shadow: 0 3px 0 var(--black);
      }

      .answer.correct {
        background: #eafff2;
        animation: bounce 560ms cubic-bezier(0.2, 1.55, 0.45, 1);
      }

      .answer.wrong {
        background: #fff0f0;
        animation: shake 360ms ease-in-out;
      }

      .status {
        position: absolute;
        right: 15px;
        top: 50%;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        opacity: 0;
        transform: translateY(-50%) scale(0.4);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .answer.correct .status,
      .answer.wrong .status {
        opacity: 1;
        transform: translateY(-50%) scale(1);
      }

      .answer.correct .status {
        background: var(--green);
      }

      .answer.wrong .status {
        background: var(--red);
      }

      .status::before {
        color: var(--white);
        font-size: 22px;
        font-weight: 1000;
      }

      .answer.correct .status::before {
        content: "✓";
      }

      .answer.wrong .status::before {
        content: "×";
      }

      .feedback {
        min-height: 28px;
        margin: 0;
        color: var(--white);
        font-size: 1.05rem;
        font-weight: 950;
        text-align: center;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.26);
      }

      .nav {
        position: absolute;
        left: 13px;
        right: 13px;
        bottom: 14px;
        height: 70px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        align-items: center;
        border: 4px solid var(--black);
        border-radius: 26px;
        background: var(--black);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }

      .nav button {
        height: 100%;
        display: grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--white);
        cursor: pointer;
        transition: transform 150ms ease;
      }

      .nav button:active {
        transform: scale(0.9);
      }

      .nav svg {
        width: 27px;
        height: 27px;
        stroke: currentColor;
        stroke-width: 2.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .confetti {
        pointer-events: none;
        position: absolute;
        inset: 0;
        overflow: hidden;
        z-index: 8;
      }

      .confetti-piece {
        position: absolute;
        top: 38%;
        left: 50%;
        width: 10px;
        height: 16px;
        border-radius: 3px;
        background: var(--white);
        opacity: 0;
        animation: confetti 860ms ease-out forwards;
      }

      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0) rotate(-2deg);
        }
        50% {
          transform: translateY(-12px) rotate(3deg);
        }
      }

      @keyframes bounce {
        0% {
          transform: scale(1);
        }
        35% {
          transform: scale(1.07);
        }
        65% {
          transform: scale(0.98);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      @keyframes confetti {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.8);
        }
      }

      @media (min-height: 760px) {
        .app {
          gap: 22px;
        }

        .hero {
          min-height: 230px;
        }
      }

      @media (max-width: 340px) {
        .answer {
          min-height: 56px;
          padding-left: 16px;
        }

        .question-card {
          padding: 19px 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Financial literacy quiz screen">
      <div class="confetti" aria-hidden="true"></div>

      <section class="app">
        <div class="progress-row" aria-label="Lesson progress 40%">
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <div class="progress-clip" aria-hidden="true">
            <svg viewBox="0 0 48 48">
              <path
                d="M18 15v16c0 5 4 8 8 8s8-3 8-8V14c0-7-5-11-11-11S12 7 12 14v18c0 10 7 15 15 15s15-5 15-15V15"
                fill="none"
                stroke="#111"
                stroke-width="5"
                stroke-linecap="round"
              />
            </svg>
          </div>
        </div>

        <div class="hero" aria-hidden="true">
          <svg class="mascot" viewBox="0 0 220 230">
            <ellipse cx="111" cy="208" rx="59" ry="13" fill="rgba(0,0,0,.17)" />
            <path
              d="M92 36c31-22 76 1 76 44v68c0 35-27 61-61 61S46 183 46 148V65c0-33 25-52 53-52 30 0 52 22 52 53v78c0 25-18 41-41 41s-41-16-41-41V68c0-11 8-19 18-19s18 8 18 19v73c0 8 5 13 12 13s12-5 12-13V67c0-17-12-28-28-28S73 50 73 67v78c0 21 15 35 36 35s36-14 36-35V78c0-28-23-43-45-29"
              fill="none"
              stroke="#111"
              stroke-width="16"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M92 36c31-22 76 1 76 44v68c0 35-27 61-61 61S46 183 46 148V65c0-33 25-52 53-52 30 0 52 22 52 53v78c0 25-18 41-41 41s-41-16-41-41V68c0-11 8-19 18-19s18 8 18 19v73c0 8 5 13 12 13s12-5 12-13V67c0-17-12-28-28-28S73 50 73 67v78c0 21 15 35 36 35s36-14 36-35V78c0-28-23-43-45-29"
              fill="none"
              stroke="#fff"
              stroke-width="9"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle cx="93" cy="93" r="7" fill="#111" />
            <circle cx="132" cy="93" r="7" fill="#111" />
            <path d="M99 121c9 8 22 8 31 0" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round" />
            <path d="M82 76c8-7 17-7 25-1" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" />
            <path d="M122 75c10-6 19-5 27 2" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" />
            <path d="M157 129l34 23" fill="none" stroke="#111" stroke-width="10" stroke-linecap="round" />
            <circle cx="193" cy="154" r="21" fill="#ffd45a" stroke="#111" stroke-width="7" />
            <text x="193" y="163" text-anchor="middle" font-size="25" font-weight="900" fill="#111">$</text>
            <path d="M31 134l30-27 18 16 26-35" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>

          <svg class="piggy" viewBox="0 0 120 82">
            <path d="M19 43c0-22 21-36 50-32 19 3 33 15 36 32 6 0 10 4 10 10s-4 10-11 10H99l-4 12H80l-4-10H50l-5 10H30l-3-12c-5-4-8-11-8-20Z" fill="#fff" stroke="#111" stroke-width="6" />
            <circle cx="84" cy="35" r="4" fill="#111" />
            <path d="M37 11l13 10" stroke="#111" stroke-width="6" stroke-linecap="round" />
            <path d="M58 9h22" stroke="#111" stroke-width="6" stroke-linecap="round" />
          </svg>

          <div class="coin-stack">
            <span class="coin"></span>
            <span class="coin"></span>
            <span class="coin"></span>
          </div>
        </div>

        <article class="question-card">
          <p class="eyebrow">Money Skill • Level 4</p>
          <h1>What is compound interest?</h1>
        </article>

        <div class="answers" role="group" aria-label="Answer options">
          <button class="answer" data-correct="true">
            Interest on interest
            <span class="status" aria-hidden="true"></span>
          </button>
          <button class="answer">
            Fixed rate
            <span class="status" aria-hidden="true"></span>
          </button>
          <button class="answer">
            Tax
            <span class="status" aria-hidden="true"></span>
          </button>
          <button class="answer">
            Cashback
            <span class="status" aria-hidden="true"></span>
          </button>
        </div>

        <p class="feedback" aria-live="polite"></p>
      </section>

      <nav class="nav" aria-label="Bottom navigation">
        <button aria-label="Home">
          <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5" /><path d="M5 10.5V21h14V10.5" /><path d="M9.5 21v-6h5v6" /></svg>
        </button>
        <button aria-label="Training">
          <svg viewBox="0 0 24 24"><path d="M12 3v18" /><path d="M5 7h14" /><path d="M7 12h10" /><path d="M9 17h6" /></svg>
        </button>
        <button aria-label="Budget">
          <svg viewBox="0 0 24 24"><path d="M4 7h16v13H4z" /><path d="M16 7V5H8v2" /><path d="M8 12h8" /><path d="M8 16h5" /></svg>
        </button>
        <button aria-label="Profile">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" /><path d="M4.5 21c1.6-4 4.1-6 7.5-6s5.9 2 7.5 6" /></svg>
        </button>
      </nav>
    </main>

    <script>
      const answers = document.querySelectorAll(".answer");
      const feedback = document.querySelector(".feedback");
      const confettiLayer = document.querySelector(".confetti");
      const confettiColors = ["#ffffff", "#111111", "#20b45b", "#ffd45a"];

      function resetAnswers() {
        answers.forEach((answer) => {
          answer.classList.remove("correct", "wrong");
          answer.disabled = false;
        });
      }

      function burstConfetti() {
        confettiLayer.innerHTML = "";

        for (let index = 0; index < 34; index += 1) {
          const piece = document.createElement("span");
          const angle = Math.random() * Math.PI * 2;
          const distance = 80 + Math.random() * 150;
          const x = Math.cos(angle) * distance;
          const y = Math.sin(angle) * distance - 70;

          piece.className = "confetti-piece";
          piece.style.setProperty("--x", `${x}px`);
          piece.style.setProperty("--y", `${y}px`);
          piece.style.setProperty("--r", `${Math.random() * 680 - 340}deg`);
          piece.style.left = `${38 + Math.random() * 24}%`;
          piece.style.top = `${32 + Math.random() * 22}%`;
          piece.style.background = confettiColors[index % confettiColors.length];
          piece.style.animationDelay = `${Math.random() * 90}ms`;
          confettiLayer.appendChild(piece);
        }

        window.setTimeout(() => {
          confettiLayer.innerHTML = "";
        }, 1200);
      }

      answers.forEach((answer) => {
        answer.addEventListener("click", () => {
          resetAnswers();

          const isCorrect = answer.dataset.correct === "true";
          answer.classList.add(isCorrect ? "correct" : "wrong");
          feedback.textContent = isCorrect ? "Nice! Your money can earn money too." : "Try again. Look for the option that grows twice.";

          if (isCorrect) {
            burstConfetti();
            answers.forEach((item) => {
              item.disabled = true;
            });

            window.setTimeout(() => {
              answers.forEach((item) => {
                item.disabled = false;
              });
            }, 900);
          }
        });
      });
    </script>
  </body>
</html>
